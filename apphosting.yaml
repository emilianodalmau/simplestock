# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Specifies the Node.js version to use.
runtime: nodejs20

# Specifies the command to build your Next.js application.
build:
  - npm install
  - npm run build

# Specifies the command to run your Next.js application.
run: npm run start

# Settings for server instances.
runConfig:
  # Increase this value to automatically spin up more instances
  # in response to increased traffic.
  maxInstances: 1

# Allow redirects from Mercado Pago with many query params.
headers:
  - path: /suscripcion
    headers:
      - key: Content-Security-Policy
        value: "frame-ancestors 'self' https://*.mercadopago.com"
